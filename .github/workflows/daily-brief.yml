name: DeckBrief — Daily Brief

on:
  schedule:
    - cron: '0 12 * * *'   # 7:00 AM EST (UTC-5) = 12:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true to preview only, no email sent'
        required: false
        default: 'false'

jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: deckbrief-api/package.json

      - name: Install dependencies
        run: npm ci
        working-directory: deckbrief-api

      - name: Send daily brief
        run: node jobs/daily-brief.js
        working-directory: deckbrief-api
        env:
          DATABASE_URL: ${{ secrets.DECKBRIEF_DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BRIEF_RECIPIENT_EMAIL: ${{ secrets.BRIEF_RECIPIENT_EMAIL }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
