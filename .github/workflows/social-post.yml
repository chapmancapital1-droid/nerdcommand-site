name: NerdCommand Social Auto-Post

on:
  schedule:
    # Mon, Wed, Fri at 10:00 AM EST (15:00 UTC)
    - cron: '0 15 * * 1,3,5'
  workflow_dispatch:
    inputs:
      category:
        description: 'Post category (studio / deckbrief / nerdcommand)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — log post but do not send'
        required: false
        default: 'false'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post to X (Twitter)
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
        run: node social/post.js ${{ github.event.inputs.category }}
